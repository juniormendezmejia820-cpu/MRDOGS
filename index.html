<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MR DOGS - Vualá Mundialista</title>
    <style>
        body { background: #000; color: white; font-family: 'Arial', sans-serif; margin: 0; text-align: center; }
        .banner-container { width: 100%; max-height: 400px; overflow: hidden; background: #111; display: flex; align-items: center; justify-content: center; border-bottom: 3px solid #ffdb58; }
        .banner { width: 100%; height: auto; max-height: 400px; object-fit: contain; }
        .content { padding: 20px; }
        
        /* TABLERO ELECTRÓNICO MUNDIALISTA */
        .mundial-timer {
            background: linear-gradient(145deg, #1a1a1a, #000);
            border: 3px solid #ffdb58;
            border-radius: 20px;
            padding: 20px 10px;
            margin: 0 auto 30px auto;
            max-width: 420px;
            box-shadow: 0 0 25px rgba(255, 219, 88, 0.4), inset 0 0 10px #000;
        }
        .timer-title { 
            color: #ffdb58; 
            font-size: 0.9rem; 
            font-weight: 900; 
            margin-bottom: 15px; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px #000;
        }
        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .time-box {
            background: #222;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px 5px;
            min-width: 70px;
            box-shadow: inset 0 0 15px #000;
        }
        .time-number {
            display: block;
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffdb58;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 10px rgba(255, 219, 88, 0.8);
        }
        .time-label {
            font-size: 0.6rem;
            color: #888;
            text-transform: uppercase;
            font-weight: bold;
        }

        .casino-container { background: #111; padding: 30px; border: 4px solid #ffdb58; border-radius: 25px; margin: 20px auto; max-width: 450px; box-shadow: 0 0 20px rgba(255, 219, 88, 0.3); }
        .slot-box { display: flex; justify-content: center; gap: 15px; background: #222; padding: 20px; border-radius: 15px; margin: 20px 0; border: 2px solid #333; overflow: hidden; }
        .slot { width: 100px; height: 100px; background: #fff; border-radius: 12px; overflow: hidden; position: relative; border: 3px solid #444; }
        .reel { position: absolute; top: 0; left: 0; width: 100%; display: flex; flex-direction: column; }
        .reel img { width: 100px; height: 100px; object-fit: cover; display: block; }
        .spinning { filter: blur(3px); }
        .input-mrdogs { padding: 15px; border-radius: 10px; border: none; width: 80%; margin-bottom: 10px; font-size: 1.2rem; text-align: center; font-weight: bold; background: #eee; color: #333; }
        .btn { display: block; width: 85%; max-width: 320px; margin: 15px auto; padding: 18px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 1.2rem; border: none; cursor: pointer; transition: 0.2s; }
        .btn-wa { background: #25d366; color: white; }
        .btn-jugar { background: #b01a1a; color: white; }
        .btn-girar { background: #ffdb58; color: black; box-shadow: 0 5px 0 #b89b2d; }
        .btn-gps { background: #4285F4; color: white; } /* Color azul para el GPS */
        #mensaje-juego { font-weight: bold; color: #ffdb58; margin-top: 15px; min-height: 1.5em; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="banner-container">
        <img src="4.png" class="banner" alt="MR DOGS">
    </div>

    <div class="content">
        <div class="mundial-timer">
            <div class="timer-title">🏆 CAMINO AL MUNDIAL 2026 ⚽</div>
            <div class="countdown-container">
                <div class="time-box"><span id="days" class="time-number">00</span><span class="time-label">Días</span></div>
                <div class="time-box"><span id="hours" class="time-number">00</span><span class="time-label">Horas</span></div>
                <div class="time-box"><span id="mins" class="time-number">00</span><span class="time-label">Min</span></div>
                <div class="time-box"><span id="secs" class="time-number">00</span><span class="time-label">Seg</span></div>
            </div>
        </div>

        <h1 style="color: #ffdb58;">MR DOGS</h1>
        <div class="casino-container">
            <h2 style="margin-top: 0;">🎰 ABRE EL COFRE</h2>
            <div id="setup-juego">
                <input type="text" id="codigo-ticket" class="input-mrdogs" placeholder="INGRESA TU CÓDIGO">
                <button onclick="validarCodigo()" class="btn btn-jugar">VERIFICAR CÓDIGO</button>
            </div>
            <div id="area-juego" style="display: none;">
                <div class="slot-box">
                    <div class="slot"><div class="reel" id="reel1"></div></div>
                    <div class="slot"><div class="reel" id="reel2"></div></div>
                    <div class="slot"><div class="reel" id="reel3"></div></div>
                </div>
                <p>Intentos del ticket: <span id="intentos-txt" style="color:#ffdb58; font-weight:bold;">3</span>/3</p>
                <button id="btn-spin" onclick="lanzarGiroPro()" class="btn btn-girar">¡GIRAR AHORA!</button>
            </div>
            <p id="mensaje-juego"></p>
        </div>

        <a href="productos.html" class="btn" style="background: #ffdb58; color: black;">📖 VER EL MENÚ COMPLETO</a>
        <a href="https://wa.me/573147300682" target="_blank" class="btn btn-wa">📱 PEDIR POR WHATSAPP</a>
        <a href="https://maps.app.goo.gl/zPzpaewUAK4YPKAP6" target="_blank" class="btn btn-gps">📍 DÓNDE ESTAMOS UBICADOS</a>
    </div>

    <script>
        // Reloj mundialista (Junio 11, 2026)
        function actualizarReloj() {
            const fechaMundial = new Date('June 11, 2026 00:00:00').getTime();
            const ahora = new Date().getTime();
            const diferencia = fechaMundial - ahora;
            const d = Math.floor(diferencia / (1000 * 60 * 60 * 24));
            const h = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diferencia % (1000 * 60)) / 1000);
            document.getElementById("days").innerText = d < 10 ? '0' + d : d;
            document.getElementById("hours").innerText = h < 10 ? '0' + h : h;
            document.getElementById("mins").innerText = m < 10 ? '0' + m : m;
            document.getElementById("secs").innerText = s < 10 ? '0' + s : s;
        }
        setInterval(actualizarReloj, 1000);
        actualizarReloj();

        const figuras = ['1.png', '2.png', '3.png']; 
        let intentos = 3;
        let usados = JSON.parse(localStorage.getItem('mrdogs_usados')) || {};

        function prepararReel(id, figuraFinal = null) {
            const reel = document.getElementById('reel' + id);
            let html = '';
            for (let i = 0; i < 19; i++) html += `<img src="${figuras[Math.floor(Math.random() * 3)]}">`;
            let final = figuraFinal !== null ? figuraFinal : Math.floor(Math.random() * 3);
            html += `<img src="${figuras[final]}">`;
            reel.innerHTML = html;
            return final;
        }
        prepararReel(1); prepararReel(2); prepararReel(3);

        function validarCodigo() {
            let cod = document.getElementById('codigo-ticket').value.trim().toLowerCase();
            let msg = document.getElementById('mensaje-juego');
            if (cod === "") return;
            if (usados[cod]) { msg.innerText = "¡Epa! Ya este perro se lo comieron. 🌭🚫"; return; }
            intentos = 3; 
            document.getElementById('intentos-txt').innerText = intentos;
            document.getElementById('btn-spin').disabled = false;
            document.getElementById('setup-juego').style.display = 'none';
            document.getElementById('area-juego').style.display = 'block';
        }

        function lanzarGiroPro() {
            if (intentos <= 0) return;
            intentos--;
            document.getElementById('intentos-txt').innerText = intentos;
            document.getElementById('btn-spin').disabled = true;
            let res = [Math.floor(Math.random() * 3), Math.floor(Math.random() * 3), Math.floor(Math.random() * 3)];
            if (res[0] === res[1] && res[1] === res[2]) res[2] = (res[0] + 1) % 3;
            [1, 2, 3].forEach((id, i) => {
                const reel = document.getElementById('reel' + id);
                reel.style.transition = 'none';
                reel.style.transform = 'translateY(0)';
                prepararReel(id, res[i]);
                void reel.offsetWidth; 
                const tiempo = 2 + (i * 0.6);
                reel.style.transition = `transform ${tiempo}s cubic-bezier(0.15, 0, 0.15, 1.05)`;
                reel.classList.add('spinning');
                reel.style.transform = `translateY(-${19 * 100}px)`;
                setTimeout(() => {
                    reel.classList.remove('spinning');
                    if (i === 2) verificarFinal(res);
                }, tiempo * 1000);
            });
        }

        function verificarFinal(res) {
            let msg = document.getElementById('mensaje-juego');
            if (res[0] === res[1] && res[1] === res[2]) {
                msg.innerHTML = "🏆 ¡GANASTE UN PREMIO!";
                marcarUsado();
            } else if (intentos > 0) {
                document.getElementById('btn-spin').disabled = false;
            } else {
                msg.innerText = "Agotaste tus intentos.";
                marcarUsado();
                setTimeout(() => { location.reload(); }, 3000);
            }
        }

        function marcarUsado() {
            let cod = document.getElementById('codigo-ticket').value.toLowerCase();
            usados[cod] = true;
            localStorage.setItem('mrdogs_usados', JSON.stringify(usados));
        }
    </script>
</body>
</html>
